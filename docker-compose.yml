services:
  # ───────── Default profile: app database ─────────
  postgres:
    image: postgres:16-alpine
    container_name: chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatdemo}
      POSTGRES_USER: ${POSTGRES_USER:-chatuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatuser} -d ${POSTGRES_DB:-chatdemo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────── Profile: observability (Langfuse v3 full stack) ─────────
  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-db
    profiles: [observability]
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: langfuse-clickhouse
    profiles: [observability]
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    profiles: [observability]
    restart: unless-stopped
    command: >
      --requirepass ${REDIS_PASSWORD:-redis}
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: langfuse-minio
    profiles: [observability]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    volumes:
      - minio_data:/data

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    profiles: [observability]
    restart: unless-stopped
    depends_on:
      langfuse-db: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      redis: { condition: service_started }
      minio: { condition: service_started }
    env_file:
      - path: .env.prod
        required: false
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      REDIS_CONNECTION_STRING: redis://default:${REDIS_PASSWORD:-redis}@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: langfuse-web
    profiles: [observability]
    restart: unless-stopped
    networks: [default, web]
    depends_on:
      langfuse-worker: { condition: service_started }
    ports:
      - "3100:3000"
    env_file:
      - path: .env.prod
        required: false
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      REDIS_CONNECTION_STRING: redis://default:${REDIS_PASSWORD:-redis}@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3100}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"

  # ───────── Profile: apps (prod containers — Dockerfiles created in `deploy` change) ─────────
  migrate:
    image: ghcr.io/omarcorr/stremingchat-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: chat-migrate
    profiles: [apps]
    restart: "no"
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
    command: ["prisma", "migrate", "deploy", "--schema=/app/node_modules/@streaming-chat/database/prisma/schema.prisma"]

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: ghcr.io/omarcorr/stremingchat-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: chat-backend
    profiles: [apps]
    restart: unless-stopped
    networks: [default, web]
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    env_file: .env.prod
    environment:
      # Override PORT from env_file so backend and frontend can share .env.prod without collision.
      PORT: "3001"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    image: ghcr.io/omarcorr/stremingchat-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: chat-frontend
    profiles: [apps]
    restart: unless-stopped
    networks: [default, web]
    depends_on:
      backend: { condition: service_healthy }
    env_file: .env.prod
    environment:
      # Override PORT from env_file (which is 3001 for the backend) so Next.js listens on 3000.
      PORT: "3000"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{if(r.status>=500)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  web:
    name: web
    external: true

volumes:
  postgres_data:
  langfuse_db_data:
  clickhouse_data:
  clickhouse_logs:
  redis_data:
  minio_data:
