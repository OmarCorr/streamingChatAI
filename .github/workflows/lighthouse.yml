name: Lighthouse CI

on:
  pull_request:
    branches:
      - main

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (production bundle)
        run: pnpm --filter @streaming-chat/frontend build
        env:
          # R5 resolution: Lighthouse CI mode — SessionBootstrap skips POST /api/sessions
          # and immediately sets sessionReady=true so the app renders a full shell
          # without a running backend. See apps/frontend/src/lib/env.ts for details.
          NEXT_PUBLIC_LIGHTHOUSE_MODE: "1"

      - name: Start Next.js production server
        run: |
          NEXT_PUBLIC_LIGHTHOUSE_MODE=1 pnpm --filter @streaming-chat/frontend start &
          # Wait for the server to be ready (poll up to 30s)
          timeout 30 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 1; done'
        env:
          PORT: 3000

      - name: Run Lighthouse CI
        run: pnpm --filter @streaming-chat/frontend exec lhci autorun --config=../../.lighthouserc.json
        # lhci exits non-zero if any threshold assertion fails — this blocks PR merge.

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30
